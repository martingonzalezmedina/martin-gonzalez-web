<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amar es Dolor | Martín González Maravillas</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#050505;
color:white;
}

.song-navbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 55px;
box-sizing:border-box;
background:rgba(5,5,5,.92);
border-bottom:1px solid rgba(212,175,55,.35);
z-index:1000;
}

.song-logo{
color:#d4af37;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

.song-navbar a{
color:white;
text-decoration:none;
padding:10px 16px;
border:1px solid rgba(212,175,55,.45);
border-radius:8px;
transition:.3s;
}

.song-navbar a:hover{
background:#d4af37;
color:#111;
}

.song-hero{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:130px 30px 80px;

text-align:center;

background:
radial-gradient(circle at 50% 25%,rgba(212,175,55,.18),transparent 30%),
radial-gradient(circle at 15% 80%,rgba(90,40,140,.18),transparent 28%),
linear-gradient(145deg,#050505,#151515 55%,#000);

}

.song-hero-content{
max-width:900px;
}

.song-label{

display:inline-block;

margin-bottom:20px;

color:#d4af37;

font-size:14px;

letter-spacing:5px;

font-weight:bold;

text-transform:uppercase;

}

.song-hero h1{

margin:0;

font-size:72px;

color:#d4af37;

}

.song-subtitle{

margin-top:24px;

font-size:25px;

line-height:1.6;

color:#efefef;

}

.song-meta{

margin-top:28px;

font-size:18px;

color:#bbbbbb;

}

.song-player{

padding:90px 30px;

text-align:center;

background:#080808;

}

.song-cover img{

width:100%;

max-width:560px;

border-radius:18px;

border:2px solid rgba(212,175,55,.35);

box-shadow:0 20px 45px rgba(0,0,0,.45);

}

.song-player h2{

color:#d4af37;

font-size:38px;

margin-top:25px;

}

.song-player audio{

width:100%;

max-width:650px;

margin-top:25px;

}

.song-story{

max-width:900px;

margin:70px auto;

padding:50px;

background:rgba(255,255,255,.03);

border:1px solid rgba(212,175,55,.25);

border-radius:18px;

box-sizing:border-box;

}

.song-story h2{

text-align:center;

color:#d4af37;

font-size:38px;

}

.song-story p{

font-size:20px;

line-height:1.9;

color:#eeeeee;

}

.song-quote{

margin-top:45px;

text-align:center;

}

.song-quote h2{

color:#d4af37;

}

.song-quote blockquote{

max-width:720px;

margin:auto;

font-size:28px;

font-style:italic;

line-height:1.6;

padding-left:25px;

border-left:4px solid #d4af37;

}

@media(max-width:800px){

.song-navbar{
padding:15px 20px;
}

.song-logo{
font-size:18px;
}

.song-hero h1{
font-size:44px;
}

.song-subtitle{
font-size:20px;
}

.song-story{
padding:30px;
}

.song-story p{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="song-logo">

</nav>

<article class="cancion-tarjeta">

  <img
    class="cancion-portada"
    src="fotos/padre.jpg"
    alt="Portada de Padre"
  >

  <div class="cancion-contenido">

    <span class="cancion-numero">
      Canción 005
    </span>

    <h3>Padre</h3>

    <p class="cancion-genero">
      Pop · Balada
    </p>

    <p class="cancion-descripcion">
      Un homenaje lleno de gratitud, amor y admiración para el hombre que dejó las enseñanzas más valiosas de una vida.
    </p>

    <a
      class="cancion-boton"
      href="canciones/padre.html"
    >
      Escuchar y conocer la historia
    </a>

  </div>
